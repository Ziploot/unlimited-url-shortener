<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ziploot Link Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    body {
      background: #0b0f19;
      color: #cbd5e1;
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      max-width: 400px;
      backdrop-filter: blur(10px);
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      margin-bottom: 10px;
      color: #fff;
    }
    p { font-size: 14px; color: #64748b; margin-bottom: 25px; }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #818cf8 0%, #10b981 100%);
      color: #fff;
      padding: 12px 28px;
      border-radius: 50px;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.2s ease;
    }
    .btn:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="card">
    <h1>⚡ ZIPLOOT LINK</h1>
    <p>Premium serverless link redirection platform. To manage links, log in to the admin panel.</p>
    <a href="admin.html" class="btn">Admin Panel</a>
  </div>
</body>
</html>
