<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <style>
    body { background: #0b0f19; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .loader { border: 3px solid rgba(255,255,255,0.1); border-radius: 50%; border-top: 3px solid #818cf8; width: 30px; height: 30px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader"></div>
  <script>
    async function redirect() {
      // 1. Get current path slug (e.g. /telegram -> telegram)
      const path = window.location.pathname;
      const slug = path.split('/').pop().trim().toLowerCase();
      try {
        const res = await fetch('/redirects.json');
        const redirects = await res.json();
        const targetUrl = redirects[slug];

        if (targetUrl) {
          // 3. Collect Analytics (Geolocation via public API)
          let country = "Unknown";
          let ip = "Unknown";
          try {
            const geoRes = await fetch('https://ipapi.co/json/');
            const geoData = await geoRes.json();
            ip = geoData.ip || "Unknown";
            country = geoData.country_name || "Unknown";
          } catch(e) {}

          const userAgent = navigator.userAgent;

          // 4. Log to Google Sheets via pre-filled Google Form submit
          // USER MUST SET THEIR FORM ACTION URL AND ENTRY IDS IN ADMIN OR MANUALLY
          const formId = localStorage.getItem("GOOGLE_FORM_ID");
          const ipEntry = localStorage.getItem("ENTRY_IP");
          const slugEntry = localStorage.getItem("ENTRY_SLUG");
          const countryEntry = localStorage.getItem("ENTRY_COUNTRY");
          const uaEntry = localStorage.getItem("ENTRY_UA");

          if (formId && ipEntry && slugEntry && countryEntry && uaEntry) {
            const formUrl = `https://docs.google.com/forms/d/e/${formId}/formResponse`;
            const payload = new URLSearchParams();
            payload.append(`entry.${slugEntry}`, slug);
            payload.append(`entry.${ipEntry}`, ip);
            payload.append(`entry.${countryEntry}`, country);
            payload.append(`entry.${uaEntry}`, userAgent);

            // Send asynchronously via sendBeacon (does not block redirect)
            navigator.sendBeacon(formUrl, payload);
          }

          // 5. Perform redirection
          window.location.replace(targetUrl);
        } else {
          document.body.innerHTML = "<h2>Link not found!</h2>";
        }
      } catch (err) {
        document.body.innerHTML = "<h2>System Error: " + err.toString() + "</h2>";
      }
    }
    redirect();
  </script>
</body>
</html>
